<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4CornersEatery - Premium Dining Experience</title>
    <link rel="stylesheet" href="src/output.css">
    <script defer src="script.js"></script>
</head>
<body>
    <!-- Header/Navbar -->
    <header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl border-b border-gray-900/30">
        <nav class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <!-- Brand -->
                <div class="flex items-center space-x-3">
                    <!-- Logo -->
                    <div class="w-10 h-10 bg-gradient-to-br from-yellow-400 to-yellow-500 rounded-lg flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-black" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 4,12A8,8 0 0,1 12,20A8,8 0 0,1 20,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6M12,8A4,4 0 0,0 8,12A4,4 0 0,0 12,16A4,4 0 0,0 16,12A4,4 0 0,0 12,8Z"/>
                        </svg>
                    </div>
                    <!-- Site Name -->
                    <div class="text-2xl font-bold text-yellow-400 tracking-wider">
                        4CornersEatery
                    </div>
                </div>
                
                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center justify-center flex-1 space-x-8">
                    <a href="#home" id="nav-home" class="nav-link text-white hover:text-yellow-400 transition-all duration-300 font-medium px-4 py-2 rounded-lg hover:bg-white/10">Home</a>
                    <a href="#about" id="nav-about" class="nav-link text-gray-300 hover:text-yellow-400 transition-all duration-300 font-medium px-4 py-2 rounded-lg hover:bg-white/10">About</a>
                    <a href="#menu" id="nav-menu" class="nav-link text-gray-300 hover:text-yellow-400 transition-all duration-300 font-medium px-4 py-2 rounded-lg hover:bg-white/10">Menu</a>
                    <a href="#contact" id="nav-contact" class="nav-link text-gray-300 hover:text-yellow-400 transition-all duration-300 font-medium px-4 py-2 rounded-lg hover:bg-white/10">Contact</a>
                </div>
                
                <!-- Login Button -->
                <!-- <button class="hidden md:block px-6 py-2 bg-yellow-400 text-black font-semibold rounded-full hover:bg-yellow-300 transform hover:scale-105 transition-all duration-300 shadow-lg">
                    Login
                </button> -->
                
                <!-- Mobile Hamburger Menu -->
                <button id="hamburger" class="md:hidden focus:outline-none">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path id="hamburger-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        <path id="close-icon" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <!-- Mobile Navigation -->
            <div id="mobile-menu" class="hidden md:hidden mt-4 pb-4">
                <div class="flex flex-col space-y-3">
                    <a href="#home" class="text-white hover:text-yellow-400 transition-colors duration-300 font-medium py-2 mobile-nav-link">Home</a>
                    <a href="#about" class="text-gray-300 hover:text-yellow-400 transition-colors duration-300 font-medium py-2 mobile-nav-link">About</a>
                    <a href="#menu" class="text-gray-300 hover:text-yellow-400 transition-colors duration-300 font-medium py-2 mobile-nav-link">Menu</a>
                    <a href="#contact" class="text-gray-300 hover:text-yellow-400 transition-colors duration-300 font-medium py-2 mobile-nav-link">Contact</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="home" class="relative min-h-screen overflow-hidden">
        <!-- Dark Black Luxury Background -->
        <div class="absolute inset-0 bg-gradient-to-br from-gray-900 via-black to-gray-950"></div>
        
        <!-- Sweet Yellow Abstract Shapes for Depth -->
        <div class="absolute top-20 left-10 w-64 h-64 bg-yellow-400/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-yellow-300/10 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 left-1/3 w-80 h-80 bg-yellow-200/10 rounded-full blur-2xl"></div>
        
        <!-- Two-Column Layout -->
        <div class="relative z-10 container mx-auto px-6 py-20">
            <div class="grid lg:grid-cols-2 gap-12 items-center min-h-screen">
                <!-- Left Side Content -->
                <div class="lg:pr-12 animate-fade-in-up">
                    <h1 class="text-6xl md:text-7xl lg:text-8xl font-black mb-8 text-white leading-tight">
                        Delight
                    </h1>
                    
                    <!-- Short Paragraph -->
                    <p class="text-lg md:text-xl text-gray-100 mb-12 leading-relaxed max-w-lg">
                        Discover exceptional culinary creations. Fresh ingredients, bold flavors, and the perfect dining atmosphere await you at 4CornersEatery.
                    </p>
                    
                    <!-- Circular Food Images -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
                        <div class="group cursor-pointer">
                            <img src="/images/rice.jpg" 
                                 alt="Pancakes" 
                                 class="w-full h-24 md:h-32 object-cover rounded-full border-4 border-yellow-400 shadow-lg group-hover:scale-110 transition-transform duration-300"
                                 onerror="this.src='https://via.placeholder.com/200x200/facc15/ffffff?text=Pancakes'">
                        </div>
                        <div class="group cursor-pointer">
                            <img src="/images/fish.jpg" 
                                 alt="Coffee" 
                                 class="w-full h-24 md:h-32 object-cover rounded-full border-4 border-yellow-400 shadow-lg group-hover:scale-110 transition-transform duration-300"
                                 onerror="this.src='https://via.placeholder.com/200x200/facc15/ffffff?text=Coffee'">
                        </div>
                        <div class="group cursor-pointer">
                            <img src="/images/drink.jpg" 
                                 alt="Eggs Benedict" 
                                 class="w-full h-24 md:h-32 object-cover rounded-full border-4 border-yellow-400 shadow-lg group-hover:scale-110 transition-transform duration-300"
                                 onerror="this.src='https://via.placeholder.com/200x200/facc15/ffffff?text=Eggs'">
                        </div>
                        <div class="group cursor-pointer">
                            <img src="/images/okra.jpg" 
                                 alt="Waffles" 
                                 class="w-full h-24 md:h-32 object-cover rounded-full border-4 border-yellow-400 shadow-lg group-hover:scale-110 transition-transform duration-300"
                                 onerror="this.src='https://via.placeholder.com/200x200/facc15/ffffff?text=Waffles'">
                        </div>
                    </div>
                    
                    <!-- Modern Search Bar -->
                    <div class="relative max-w-md">
                        <input type="text" 
                               placeholder="Search food items..." 
                               class="w-full px-6 py-4 pl-14 bg-white/90 backdrop-blur-sm rounded-full text-black placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-yellow-400/50 transition-all duration-300">
                        <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
                
                <!-- Right Side Large Image -->
                <div class="lg:pl-12 flex items-center justify-center">
                    <div class="relative group">
                        <img src="/images/food.jpg" 
                             alt="Food Spread" 
                             class="w-full max-w-md lg:max-w-full h-auto rounded-3xl shadow-2xl group-hover:scale-105 transition-transform duration-500"
                             onerror="this.src='https://via.placeholder.com/600x800/facc15/ffffff?text=Food+Spread'">
                        <!-- Overlapping Effect -->
                        <div class="absolute -bottom-6 -right-6 w-32 h-32 bg-yellow-400 rounded-2xl shadow-xl -z-10 lg:block hidden"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Menu Section DOUBLE-T -->
    <section id="menu">
        <h2>Menu Section</h2>
    </section>

    <!-- About Section JOHN -->
    <section id="about">
        <h2>About Section</h2>
    </section>

    <!-- Contact section MIRACLE   -->
    <section id="contact">
        <h2>Contact Section</h2>
    </section>

    <!-- Footer Section DOUBLE-T --> 
    <footer id="footer">
        <h2>Footer Section</h2>
    </footer>

    <style>
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in-up {
            animation: fade-in-up 1.2s ease-out;
        }
    </style>
</body>
</html>
